openapi: 3.0.3
info:
  title: Inspectio HTTP contracts (public API + internal services)
  version: "1.0.0"
  description: |
    Canonical JSON shapes. Implementations must match these schemas.
    Source of truth narrative: plans/ASSIGNMENT.pdf + plans/V3_ASYNC_PIPELINE_IMPLEMENTATION_PLAN.md.
    Per-phase implementation specs: plans/v3_phases/ (P0–P7). Evolve this file with code (OpenAPI-first).
    v3 L2: single and repeat admission enqueue one BulkIntentV1; repeat returns a summary (no per-id arrays).
    Idempotency is in-process TTL until multi-replica Redis dedupe (plans/v3_phases/P1).

tags:
  - name: public-api
    description: External API — port INSPECTIO_API_PORT default 8000
  - name: notification-internal
    description: Optional legacy/internal outcomes paths; v3 L2 may serve GET /messages/* directly until deprecated.
  - name: mock-sms
    description: Optional mock provider (not used in v3 phase-1 void-send path); host port 8090 when enabled

servers:
  - url: http://127.0.0.1:8000
    description: inspectio-api
  - url: http://127.0.0.1:8081
    description: inspectio-notification
  - url: http://127.0.0.1:8090
    description: mock-sms (docker publish 8090→8080)

paths:
  /messages:
    post:
      tags: [public-api]
      summary: Admit single message as BulkIntentV1 with count=1 (202)
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
            minLength: 1
          description: Duplicate within TTL returns the same batchCorrelationId without a second enqueue (in-process only until Redis).
        - name: X-Trace-Id
          in: header
          required: false
          schema:
            type: string
            minLength: 1
          description: Optional trace id; server generates one if omitted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostMessageRequest"
      responses:
        "202":
          description: Accepted for async enqueue (v3; not durable journal yet)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostMessageAccepted"
        "400":
          description: Validation error
        "409":
          description: Idempotency-Key reused with a different payload
        "429":
          description: Throttled
        "503":
          description: Ingest unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorIngestUnavailable"

  /messages/repeat:
    post:
      tags: [public-api]
      summary: Admit N logical recipients with one body via one BulkIntentV1 (202)
      parameters:
        - name: count
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
            minLength: 1
        - name: X-Trace-Id
          in: header
          required: false
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostMessageRequest"
      responses:
        "202":
          description: Accepted; summary response (O(1) JSON size w.r.t. N per v3 plan 3.2)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostMessagesRepeatAccepted"
        "400":
          description: Invalid count or body
        "409":
          description: Idempotency-Key reused with different count or body

  /messages/success:
    get:
      tags: [public-api]
      summary: Recent successful terminals
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 100
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutcomeListResponse"

  /messages/failed:
    get:
      tags: [public-api]
      summary: Recent failed terminals
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 100
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutcomeListResponse"

  /healthz:
    get:
      tags: [public-api, notification-internal]
      summary: Liveness
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthzResponse"

  /internal/v1/outcomes/terminal:
    post:
      tags: [notification-internal]
      summary: Worker publishes terminal outcome
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageTerminalV1"
      responses:
        "204":
          description: Stored (preferred)
        "200":
          description: OK (allowed if body returned)
        "400":
          description: Invalid body

  /internal/v1/outcomes/success:
    get:
      tags: [notification-internal]
      summary: API proxy source for GET /messages/success
      parameters:
        - name: limit
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutcomeListResponse"

  /internal/v1/outcomes/failed:
    get:
      tags: [notification-internal]
      summary: API proxy source for GET /messages/failed
      parameters:
        - name: limit
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutcomeListResponse"

  /send:
    post:
      tags: [mock-sms]
      summary: Mock SMS dispatch
      servers:
        - url: http://127.0.0.1:8090
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MockSmsSendRequest"
      responses:
        "200":
          description: Simulated success
        "500":
          description: Simulated provider failure
        "400":
          description: Bad request

components:
  schemas:
    PostMessageRequest:
      type: object
      required: [body]
      properties:
        body:
          type: string
          minLength: 1
          description: Non-empty after trim (enforced by server)
        to:
          type: string
          description: Optional E.164; default INSPECTIO_DEFAULT_TO_E164

    PostMessageAccepted:
      type: object
      required: [messageId, shardId, batchCorrelationId]
      properties:
        messageId:
          type: string
          format: uuid
          description: Admission id for this request (v3; aligns with bulk correlation for count=1)
        batchCorrelationId:
          type: string
          format: uuid
          description: BulkIntentV1.batchCorrelationId for expander idempotency and tracing
        shardId:
          type: integer
          minimum: 0
          description: Predicted send shard hash(batchCorrelationId) % K (K from INSPECTIO_V3_SEND_SHARD_COUNT, default 1)

    PostMessagesRepeatAccepted:
      type: object
      required: [accepted, batchCorrelationId, count]
      properties:
        accepted:
          type: integer
          description: Recipients admitted (equals count on success)
        batchCorrelationId:
          type: string
          format: uuid
        count:
          type: integer
          minimum: 1
          description: Same as query count

    OutcomeItem:
      type: object
      required: [messageId, attemptCount, finalTimestamp, reason]
      properties:
        messageId:
          type: string
          format: uuid
        attemptCount:
          type: integer
          minimum: 1
          maximum: 6
        finalTimestamp:
          type: integer
          format: int64
          description: UTC epoch milliseconds (terminal instant)
        reason:
          type: string
          nullable: true
          description: null for success; non-empty for failed

    OutcomeListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/OutcomeItem"

    MessageTerminalV1:
      type: object
      required: [messageId, terminalStatus, attemptCount, finalTimestampMs]
      properties:
        messageId:
          type: string
          format: uuid
        terminalStatus:
          type: string
          enum: [success, failed]
        attemptCount:
          type: integer
          minimum: 1
          maximum: 6
        finalTimestampMs:
          type: integer
          format: int64
        reason:
          type: string
          nullable: true
          description: Required semantic for failed; may be null on success

    HealthzResponse:
      type: object
      required: [status, service]
      properties:
        status:
          type: string
          enum: [ok]
        service:
          type: string
          enum: [api, notification]

    ErrorIngestUnavailable:
      type: object
      properties:
        error:
          type: string
          example: ingest_unavailable
        detail:
          type: string

    MockSmsSendRequest:
      type: object
      required: [to, body]
      properties:
        to:
          type: string
        body:
          type: string
        messageId:
          type: string
          format: uuid
        attemptIndex:
          type: integer
          minimum: 0
          maximum: 5
