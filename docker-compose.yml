# Local stack: deps + greenfield app containers (see plans/IMPLEMENTATION_PHASES.md P9).
name: inspectio

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  localstack:
    image: localstack/localstack:3.5
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,kinesis
      DEBUG: "0"
      AWS_DEFAULT_REGION: us-east-1
      INSPECTIO_S3_BUCKET: inspectio-dev
      INSPECTIO_KINESIS_STREAM_NAME: inspectio-ingest
      INSPECTIO_KINESIS_LOCAL_SHARDS: "1"
    volumes:
      - ./deploy/localstack/init/ready.d:/etc/localstack/init/ready.d:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  mock-sms:
    build:
      context: ./v1_obsolete/project
      dockerfile: Dockerfile
    command: ["inspectio-mock-sms"]
    environment:
      INSPECTIO_MOCK_SMS_PORT: "8080"
      INSPECTIO_MOCK_FAILURE_RATE: "0"
    ports:
      - "8090:8080"

  inspectio-notification:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    command:
      [
        "uvicorn",
        "inspectio.notification.app:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8081",
      ]
    depends_on:
      redis:
        condition: service_started
    environment:
      INSPECTIO_ENV: dev
      INSPECTIO_NOTIFICATION_PORT: "8081"
      INSPECTIO_REDIS_URL: redis://redis:6379/0
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    ports:
      - "8081:8081"

  inspectio-api:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    command:
      [
        "uvicorn",
        "inspectio.api.app:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
      ]
    depends_on:
      localstack:
        condition: service_healthy
      redis:
        condition: service_started
      mock-sms:
        condition: service_started
      inspectio-notification:
        condition: service_started
    environment:
      INSPECTIO_ENV: dev
      INSPECTIO_API_PORT: "8000"
      INSPECTIO_AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL: http://localstack:4566
      INSPECTIO_S3_BUCKET: inspectio-dev
      INSPECTIO_KINESIS_STREAM_NAME: inspectio-ingest
      INSPECTIO_REDIS_URL: redis://redis:6379/0
      INSPECTIO_NOTIFICATION_BASE_URL: http://inspectio-notification:8081
      INSPECTIO_SMS_URL: http://mock-sms:8080
    ports:
      - "8000:8000"

  inspectio-worker:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    command: ["python", "-m", "inspectio.worker.main"]
    depends_on:
      localstack:
        condition: service_healthy
      redis:
        condition: service_started
      mock-sms:
        condition: service_started
      inspectio-notification:
        condition: service_started
    environment:
      INSPECTIO_ENV: dev
      INSPECTIO_AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL: http://localstack:4566
      INSPECTIO_S3_BUCKET: inspectio-dev
      INSPECTIO_KINESIS_STREAM_NAME: inspectio-ingest
      INSPECTIO_REDIS_URL: redis://redis:6379/0
      INSPECTIO_NOTIFICATION_BASE_URL: http://inspectio-notification:8081
      INSPECTIO_SMS_URL: http://mock-sms:8080
      INSPECTIO_WORKER_REPLICAS: "1"
      INSPECTIO_WORKER_INDEX: "0"
