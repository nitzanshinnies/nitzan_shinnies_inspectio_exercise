# Local dependencies only until v3 app services land (see plans/V3_ASYNC_PIPELINE_IMPLEMENTATION_PLAN.md).
# v2 app stack (api, worker, notification, mock-sms) is archived under v2_obsolete/archive/.
# Default S3 bucket name is inspectio-test-bucket (LocalStack init + INSPECTIO_S3_BUCKET).
name: inspectio

x-aws-apps: &aws_apps
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
  AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
  AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
  AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL:-http://localstack:4566}
  INSPECTIO_S3_BUCKET: ${INSPECTIO_S3_BUCKET:-${S3_BUCKET:-inspectio-test-bucket}}

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  localstack:
    image: localstack/localstack:3.5
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,sqs
      DEBUG: "0"
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      INSPECTIO_S3_BUCKET: ${INSPECTIO_S3_BUCKET:-${S3_BUCKET:-inspectio-test-bucket}}
      INSPECTIO_INGEST_QUEUE_NAME: ${INSPECTIO_INGEST_QUEUE_NAME:-inspectio-ingest.fifo}
      INSPECTIO_V3_BULK_QUEUE_NAME: ${INSPECTIO_V3_BULK_QUEUE_NAME:-inspectio-v3-bulk}
      INSPECTIO_V3_SEND_SHARD_COUNT: ${INSPECTIO_V3_SEND_SHARD_COUNT:-1}
    volumes:
      - ./deploy/localstack/init/ready.d:/etc/localstack/init/ready.d:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  inspectio-api:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    command:
      [
        "uvicorn",
        "inspectio.v3.l2.serve:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
      ]
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_started
      localstack:
        condition: service_healthy
    environment:
      <<: *aws_apps
      REDIS_URL: redis://redis:6379/0
      INSPECTIO_V3_BULK_QUEUE_URL: http://localstack:4566/000000000000/inspectio-v3-bulk
      INSPECTIO_V3_SEND_SHARD_COUNT: ${INSPECTIO_V3_SEND_SHARD_COUNT:-1}

  inspectio-expander:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    command: ["inspectio-v3-expander"]
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      <<: *aws_apps
      INSPECTIO_V3_BULK_QUEUE_URL: http://localstack:4566/000000000000/inspectio-v3-bulk
      INSPECTIO_V3_SEND_SHARD_COUNT: ${INSPECTIO_V3_SEND_SHARD_COUNT:-1}
      INSPECTIO_V3_SEND_QUEUE_URLS: http://localstack:4566/000000000000/inspectio-v3-send-0
      INSPECTIO_V3_EXPANDER_WAIT_SECONDS: ${INSPECTIO_V3_EXPANDER_WAIT_SECONDS:-20}
      INSPECTIO_V3_BULK_VISIBILITY_TIMEOUT: ${INSPECTIO_V3_BULK_VISIBILITY_TIMEOUT:-120}

  inspectio-worker:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    command: ["inspectio-v3-worker"]
    depends_on:
      redis:
        condition: service_started
      localstack:
        condition: service_healthy
    environment:
      <<: *aws_apps
      REDIS_URL: redis://redis:6379/0
      INSPECTIO_V3_WORKER_SEND_QUEUE_URL: http://localstack:4566/000000000000/inspectio-v3-send-0
      INSPECTIO_V3_PERSIST_QUEUE_URL: ${INSPECTIO_V3_PERSIST_QUEUE_URL:-http://localstack:4566/000000000000/inspectio-v3-persist}
      INSPECTIO_V3_TRY_SEND_ALWAYS_SUCCEED: ${INSPECTIO_V3_TRY_SEND_ALWAYS_SUCCEED:-true}
