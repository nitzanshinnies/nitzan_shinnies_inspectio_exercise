# Local dependencies for greenfield work (plans/IMPLEMENTATION_PHASES P0–P8).
# Inspectio application containers (api / worker / notification) are added in P9 (§29.3).
# AWS/S3: defaults match v1 (`inspectio-test-bucket` in v1_obsolete/.../test_aws_s3_provider.py).
# Pass the same credentials as your AWS CLI: set vars in `.env` (see `.env.example`) or export before `docker compose up`.
name: inspectio

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  localstack:
    image: localstack/localstack:3.5
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,kinesis
      DEBUG: "0"
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      INSPECTIO_S3_BUCKET: ${INSPECTIO_S3_BUCKET:-${S3_BUCKET:-inspectio-test-bucket}}
      INSPECTIO_KINESIS_STREAM_NAME: ${INSPECTIO_KINESIS_STREAM_NAME:-inspectio-ingest}
      INSPECTIO_KINESIS_LOCAL_SHARDS: ${INSPECTIO_KINESIS_LOCAL_SHARDS:-1}
    volumes:
      - ./deploy/localstack/init/ready.d:/etc/localstack/init/ready.d:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  mock-sms:
    build:
      context: ./v1_obsolete/project
      dockerfile: Dockerfile
    command: ["inspectio-mock-sms"]
    environment:
      INSPECTIO_MOCK_SMS_PORT: "8080"
      INSPECTIO_MOCK_FAILURE_RATE: "0"
    ports:
      - "8090:8080"
