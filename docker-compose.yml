services:
  web:
    build: ./frontend
    depends_on:
      - api
    ports:
      - "3000:80"

  api:
    build: .
    command: ["inspectio-api"]
    depends_on:
      - mock-sms
      - notification
      - persistence
      - worker
    environment:
      INSPECTIO_API_PORT: "8000"
      INSPECTIO_WORKER_ACTIVATION_URLS: http://worker:8004
      INSPECTIO_WORKER_SHARDS_PER_POD: "256"
      NOTIFICATION_SERVICE_URL: http://notification:8002
      PERSISTENCE_SERVICE_URL: http://persistence:8001
      TOTAL_SHARDS: "256"
    ports:
      - "8000:8000"

  health-monitor:
    build: .
    command: ["inspectio-health-monitor"]
    depends_on:
      - mock-sms
      - persistence
    environment:
      INSPECTIO_HEALTH_MONITOR_PORT: "8003"
      # Must match mock SMS cap; health monitor reads mock_sms.config at startup.
      INSPECTIO_MOCK_AUDIT_SENDS_MAX_LIMIT: "250000"
      MOCK_SMS_URL: http://mock-sms:8080
      PERSISTENCE_SERVICE_URL: http://persistence:8001
    ports:
      - "8003:8003"

  mock-sms:
    build: .
    command: ["inspectio-mock-sms"]
    environment:
      INSPECTIO_MOCK_AUDIT_LOG_MAX_ENTRIES: "500000"
      INSPECTIO_MOCK_AUDIT_SENDS_MAX_LIMIT: "250000"
      INSPECTIO_MOCK_FAILURE_RATE: "0"
      INSPECTIO_MOCK_SMS_PORT: "8080"
    ports:
      - "8080:8080"

  notification:
    build: .
    command: ["inspectio-notification"]
    depends_on:
      - persistence
      - redis
    environment:
      INSPECTIO_NOTIFICATION_PORT: "8002"
      OUTCOMES_STORE_BACKEND: redis
      PERSISTENCE_SERVICE_URL: http://persistence:8001
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8002:8002"

  persistence:
    build: .
    command: ["inspectio-persistence"]
    environment:
      INSPECTIO_PERSISTENCE_BACKEND: local
      INSPECTIO_PERSISTENCE_PORT: "8001"
      LOCAL_S3_ROOT: /data/local-s3
    ports:
      - "8001:8001"
    volumes:
      - ./.local-s3:/data/local-s3

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  worker:
    build: .
    command: ["inspectio-worker"]
    depends_on:
      - mock-sms
      - notification
      - persistence
    environment:
      HOSTNAME: worker-0
      INSPECTIO_WORKER_PORT: "8004"
      MOCK_SMS_URL: http://mock-sms:8080
      NOTIFICATION_SERVICE_URL: http://notification:8002
      PERSISTENCE_SERVICE_URL: http://persistence:8001
      SHARDS_PER_POD: "256"
      TOTAL_SHARDS: "256"
    ports:
      - "8004:8004"
