services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  persistence:
    build: .
    command: ["inspectio-persistence"]
    environment:
      INSPECTIO_PERSISTENCE_PORT: "8001"
    ports:
      - "8001:8001"

  notification:
    build: .
    command: ["inspectio-notification"]
    environment:
      INSPECTIO_NOTIFICATION_PORT: "8002"
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8002:8002"
    depends_on:
      - redis

  mock-sms:
    build: .
    command: ["inspectio-mock-sms"]
    environment:
      INSPECTIO_MOCK_SMS_PORT: "8080"
    ports:
      - "8080:8080"

  health-monitor:
    build: .
    command: ["inspectio-health-monitor"]
    environment:
      INSPECTIO_HEALTH_MONITOR_PORT: "8003"
    ports:
      - "8003:8003"

  worker:
    build: .
    command: ["inspectio-worker"]
    environment:
      INSPECTIO_WORKER_PORT: "8004"
    ports:
      - "8004:8004"

  api:
    build: .
    command: ["inspectio-api"]
    environment:
      INSPECTIO_API_PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      - persistence
      - notification
      - mock-sms
