apiVersion: v1
kind: Service
metadata:
  name: health-monitor
  namespace: inspectio
  labels:
    app.kubernetes.io/name: inspectio-exercise
    app.kubernetes.io/component: health-monitor
spec:
  selector:
    app.kubernetes.io/component: health-monitor
  ports:
    - name: http
      port: 8003
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-monitor
  namespace: inspectio
  labels:
    app.kubernetes.io/name: inspectio-exercise
    app.kubernetes.io/component: health-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: health-monitor
  template:
    metadata:
      labels:
        app.kubernetes.io/component: health-monitor
    spec:
      containers:
        - name: health-monitor
          image: inspectio-exercise:latest
          imagePullPolicy: IfNotPresent
          command: ["inspectio-health-monitor"]
          ports:
            - name: http
              containerPort: 8003
          env:
            - name: INSPECTIO_HEALTH_MONITOR_PORT
              value: "8003"
            - name: PERSISTENCE_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: inspectio-config
                  key: PERSISTENCE_SERVICE_URL
            - name: MOCK_SMS_URL
              valueFrom:
                configMapKeyRef:
                  name: inspectio-config
                  key: MOCK_SMS_URL
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
