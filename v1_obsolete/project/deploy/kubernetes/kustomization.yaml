# Build images first, then:
#   kubectl apply -k deploy/kubernetes
#
# Images (override with kustomize or patch):
#   docker build -t inspectio-exercise:latest .
#   docker build -t inspectio-web:latest ./frontend
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: inspectio

resources:
  - namespace.yaml
  - configmap.yaml
  - persistence-pvc.yaml
  - redis.yaml
  - persistence.yaml
  - mock-sms.yaml
  - notification.yaml
  - worker.yaml
  - api.yaml
  - health-monitor.yaml
  - web.yaml
  # - ingress.yaml

images:
  - name: inspectio-exercise
    newName: inspectio-exercise
    newTag: latest
  - name: inspectio-web
    newName: inspectio-web
    newTag: latest
