apiVersion: apps/v1
kind: Deployment
metadata:
  name: inspectio-worker
  namespace: inspectio
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: inspectio-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inspectio-worker
    spec:
      serviceAccountName: inspectio-apps
      containers:
        - name: worker
          image: inspectio-app:latest
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - inspectio.worker.main
          envFrom:
            - configMapRef:
                name: inspectio-config
            - secretRef:
                name: inspectio-aws
