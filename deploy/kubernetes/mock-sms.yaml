apiVersion: v1
kind: Service
metadata:
  name: mock-sms
  namespace: inspectio
  labels:
    app.kubernetes.io/name: inspectio-exercise
    app.kubernetes.io/component: mock-sms
spec:
  selector:
    app.kubernetes.io/component: mock-sms
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-sms
  namespace: inspectio
  labels:
    app.kubernetes.io/name: inspectio-exercise
    app.kubernetes.io/component: mock-sms
spec:
  replicas: 4
  selector:
    matchLabels:
      app.kubernetes.io/component: mock-sms
  template:
    metadata:
      labels:
        app.kubernetes.io/component: mock-sms
    spec:
      containers:
        - name: mock-sms
          image: inspectio-exercise:latest
          imagePullPolicy: IfNotPresent
          command: ["inspectio-mock-sms"]
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: INSPECTIO_MOCK_SMS_PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
