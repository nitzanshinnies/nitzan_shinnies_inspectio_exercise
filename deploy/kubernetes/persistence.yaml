apiVersion: v1
kind: Service
metadata:
  name: persistence
  namespace: inspectio
  labels:
    app.kubernetes.io/name: inspectio-exercise
    app.kubernetes.io/component: persistence
spec:
  selector:
    app.kubernetes.io/component: persistence
  ports:
    - name: http
      port: 8001
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: persistence
  namespace: inspectio
  labels:
    app.kubernetes.io/name: inspectio-exercise
    app.kubernetes.io/component: persistence
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: persistence
  template:
    metadata:
      labels:
        app.kubernetes.io/component: persistence
    spec:
      containers:
        - name: persistence
          image: inspectio-exercise:latest
          imagePullPolicy: IfNotPresent
          command: ["inspectio-persistence"]
          ports:
            - name: http
              containerPort: 8001
          env:
            - name: INSPECTIO_PERSISTENCE_PORT
              value: "8001"
            - name: INSPECTIO_PERSISTENCE_BACKEND
              valueFrom:
                configMapKeyRef:
                  name: inspectio-config
                  key: INSPECTIO_PERSISTENCE_BACKEND
            - name: LOCAL_S3_ROOT
              valueFrom:
                configMapKeyRef:
                  name: inspectio-config
                  key: LOCAL_S3_ROOT
          volumeMounts:
            - name: local-s3
              mountPath: /data/local-s3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
      volumes:
        - name: local-s3
          persistentVolumeClaim:
            claimName: persistence-local-s3
