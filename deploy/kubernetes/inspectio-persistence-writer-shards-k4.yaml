# P12.8 template: one writer deployment per persistence shard (K=4).
#
# Before apply:
# - set INSPECTIO_V3_PERSIST_TRANSPORT_SHARD_COUNT="4" in configmap.yaml
# - set INSPECTIO_V3_PERSIST_TRANSPORT_QUEUE_URLS to 4 queue URLs
# - keep INSPECTIO_V3_PERSISTENCE_S3_BUCKET configured
#
# Usage:
# kubectl -n inspectio delete deployment inspectio-persistence-writer --ignore-not-found
# kubectl -n inspectio apply -f deploy/kubernetes/inspectio-persistence-writer-shards-k4.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inspectio-persistence-writer-shard-0
  namespace: inspectio
  labels:
    app.kubernetes.io/name: inspectio-persistence-writer-shard-0
    app.kubernetes.io/part-of: inspectio-v3
    inspectio.io/persistence-shard: "0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: inspectio-persistence-writer-shard-0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inspectio-persistence-writer-shard-0
        app.kubernetes.io/part-of: inspectio-v3
        inspectio.io/persistence-shard: "0"
    spec:
      serviceAccountName: inspectio-app
      containers:
        - name: persistence-writer
          image: inspectio-v3:latest
          imagePullPolicy: IfNotPresent
          command: ["inspectio-v3-persistence-writer"]
          env:
            - name: INSPECTIO_V3_WRITER_SHARD_ID
              value: "0"
          envFrom:
            - configMapRef:
                name: inspectio-v3-config
            - secretRef:
                name: inspectio-v3-secrets
                optional: true
---
