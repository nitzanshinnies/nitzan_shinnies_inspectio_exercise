apiVersion: v1
kind: Secret
metadata:
  name: inspectio-secrets
  namespace: inspectio
type: Opaque
stringData:
  # Required. Use a real AWS bucket in this environment.
  INSPECTIO_S3_BUCKET: "REPLACE_WITH_BUCKET_NAME"

  # Required for notification outcomes and idempotency.
  INSPECTIO_REDIS_URL: "redis://REPLACE_WITH_REDIS_HOST:6379/0"

  # Internal service URLs in-cluster.
  INSPECTIO_NOTIFICATION_BASE_URL: "http://inspectio-notification.inspectio.svc.cluster.local:8081"
  INSPECTIO_SMS_URL: "http://REPLACE_WITH_SMS_HOST:8080"

  # AWS credentials should come from IRSA. Keep these empty unless debugging.
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  AWS_SESSION_TOKEN: ""
