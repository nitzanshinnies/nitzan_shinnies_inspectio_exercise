apiVersion: v1
kind: Service
metadata:
  name: inspectio-api
  namespace: inspectio
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app.kubernetes.io/name: inspectio-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inspectio-api
  namespace: inspectio
spec:
  replicas: 6
  selector:
    matchLabels:
      app.kubernetes.io/name: inspectio-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inspectio-api
    spec:
      serviceAccountName: inspectio-app
      containers:
        - name: api
          image: inspectio-app:latest
          imagePullPolicy: IfNotPresent
          args:
            - uvicorn
            - inspectio.api.app:app
            - --host
            - 0.0.0.0
            - --port
            - "8000"
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: inspectio-config
            - secretRef:
                name: inspectio-secrets
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
