apiVersion: v1
kind: Service
metadata:
  name: inspectio-api
  namespace: inspectio
  labels:
    app.kubernetes.io/name: inspectio-api
    app.kubernetes.io/part-of: inspectio-v3
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app.kubernetes.io/name: inspectio-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inspectio-api
  namespace: inspectio
  labels:
    app.kubernetes.io/name: inspectio-api
    app.kubernetes.io/part-of: inspectio-v3
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: inspectio-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inspectio-api
        app.kubernetes.io/part-of: inspectio-v3
    spec:
      serviceAccountName: inspectio-app
      containers:
        - name: api
          image: inspectio-v3:latest
          imagePullPolicy: IfNotPresent
          args:
            - uvicorn
            - inspectio.v3.l2.serve:app
            - --host
            - 0.0.0.0
            - --port
            - "8000"
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: inspectio-v3-config
            - secretRef:
                name: inspectio-v3-secrets
                optional: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
