apiVersion: v1
kind: Service
metadata:
  name: inspectio-notification
  namespace: inspectio
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: 8081
  selector:
    app.kubernetes.io/name: inspectio-notification
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inspectio-notification
  namespace: inspectio
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: inspectio-notification
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inspectio-notification
    spec:
      serviceAccountName: inspectio-apps
      containers:
        - name: notification
          image: inspectio-app:latest
          imagePullPolicy: IfNotPresent
          args:
            - uvicorn
            - inspectio.notification.app:app
            - --host
            - 0.0.0.0
            - --port
            - "8081"
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: inspectio-config
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 15
