# Example only — do not commit real credentials. Prefer IRSA on EKS (see serviceaccount.yaml).
# Create a Secret in the cluster instead, e.g.:
#   kubectl -n inspectio create secret generic inspectio-v3-secrets \
#     --from-literal=AWS_ACCESS_KEY_ID=... \
#     --from-literal=AWS_SECRET_ACCESS_KEY=...
#
# Deployments reference this name with optional: true so pods still schedule without it when using IRSA.
apiVersion: v1
kind: Secret
metadata:
  name: inspectio-v3-secrets
  namespace: inspectio
  labels:
    app.kubernetes.io/part-of: inspectio-v3
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "REPLACE_ME"
  AWS_SECRET_ACCESS_KEY: "REPLACE_ME"
