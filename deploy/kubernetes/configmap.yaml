apiVersion: v1
kind: ConfigMap
metadata:
  name: inspectio-config
  namespace: inspectio
  labels:
    app.kubernetes.io/name: inspectio-exercise
data:
  TOTAL_SHARDS: "256"
  SHARDS_PER_POD: "256"
  INSPECTIO_WORKER_SHARDS_PER_POD: "256"
  # Headless StatefulSet: pod worker-0 → http://worker-0.worker:8004
  INSPECTIO_WORKER_ACTIVATION_URLS: http://worker-0.worker:8004
  PERSISTENCE_SERVICE_URL: http://persistence:8001
  NOTIFICATION_SERVICE_URL: http://notification:8002
  MOCK_SMS_URL: http://mock-sms:8080
  REDIS_URL: redis://redis:6379/0
  OUTCOMES_STORE_BACKEND: redis
  INSPECTIO_PERSISTENCE_BACKEND: local
  LOCAL_S3_ROOT: /data/local-s3
  # Batch writes: parallel PutObject threads (persistence) + API repeat batch size + HTTP batch cap.
  INSPECTIO_PERSISTENCE_PUT_MAX_WORKERS: "32"
  INSPECTIO_HTTP_PUT_OBJECTS_MAX_ITEMS: "512"
  INSPECTIO_REPEAT_SUBMIT_PUT_BATCH_SIZE: "64"
  # Peer httpx pools (API + worker); defaults match inspectio_exercise.common.http_client.
  INSPECTIO_HTTPX_MAX_CONNECTIONS: "256"
  INSPECTIO_HTTPX_MAX_KEEPALIVE_CONNECTIONS: "64"
  INSPECTIO_HTTPX_POOL_TIMEOUT_SEC: "30"
  # Worker tick: max concurrent message handles (see inspectio_exercise.worker.runtime).
  INSPECTIO_WORKER_MAX_PARALLEL_HANDLES: "128"
