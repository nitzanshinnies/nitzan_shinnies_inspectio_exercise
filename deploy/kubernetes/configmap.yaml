# Replace queue URL placeholders with real AWS SQS URLs (standard queues). K must match URL lists.
apiVersion: v1
kind: ConfigMap
metadata:
  name: inspectio-v3-config
  namespace: inspectio
  labels:
    app.kubernetes.io/part-of: inspectio-v3
data:
  AWS_DEFAULT_REGION: "us-east-1"
  REDIS_URL: "redis://redis:6379/0"
  INSPECTIO_V3_SEND_SHARD_COUNT: "1"
  INSPECTIO_V3_BULK_QUEUE_URL: "REPLACE_WITH_SQS_BULK_QUEUE_URL"
  # JSON array string: pydantic-settings decodes list fields from env as JSON before CSV validation.
  INSPECTIO_V3_SEND_QUEUE_URLS: '["REPLACE_WITH_SQS_SEND_QUEUE_URL_SHARD_0"]'
  INSPECTIO_V3_WORKER_SEND_QUEUE_URL: "REPLACE_WITH_SQS_SEND_QUEUE_URL_SHARD_0"
  INSPECTIO_V3_EXPANDER_WAIT_SECONDS: "20"
  INSPECTIO_V3_BULK_VISIBILITY_TIMEOUT: "120"
  INSPECTIO_L2_BASE_URL: "http://inspectio-api:8000"
  INSPECTIO_V3_TRY_SEND_ALWAYS_SUCCEED: "true"
  INSPECTIO_V3_WORKER_RECOVERY_ENABLED: "false"
  INSPECTIO_V3_WORKER_RECOVERY_SHARD: "0"
  INSPECTIO_V3_PERSIST_EMIT_ENABLED: "false"
  INSPECTIO_V3_PERSIST_DURABILITY_MODE: "best_effort"
  INSPECTIO_V3_PERSIST_TRANSPORT_QUEUE_URL: "REPLACE_WITH_PERSIST_TRANSPORT_QUEUE_URL"
  INSPECTIO_V3_PERSIST_TRANSPORT_DLQ_URL: ""
  INSPECTIO_V3_PERSIST_TRANSPORT_SHARD_COUNT: "1"
  INSPECTIO_V3_PERSIST_TRANSPORT_QUEUE_URLS: '["REPLACE_WITH_PERSIST_TRANSPORT_QUEUE_URL_SHARD_0"]'
  INSPECTIO_V3_PERSIST_TRANSPORT_DLQ_URLS: ""
  INSPECTIO_V3_PERSIST_TRANSPORT_MAX_ATTEMPTS: "4"
  INSPECTIO_V3_PERSIST_TRANSPORT_BACKOFF_BASE_MS: "50"
  INSPECTIO_V3_PERSIST_TRANSPORT_BACKOFF_MAX_MS: "2000"
  INSPECTIO_V3_PERSIST_TRANSPORT_BACKOFF_JITTER: "0.2"
  INSPECTIO_V3_PERSIST_TRANSPORT_MAX_INFLIGHT: "8192"
  INSPECTIO_V3_PERSIST_TRANSPORT_BATCH_MAX_EVENTS: "10"
  INSPECTIO_V3_PERSISTENCE_S3_BUCKET: "REPLACE_WITH_PERSISTENCE_S3_BUCKET"
  INSPECTIO_V3_PERSISTENCE_S3_PREFIX: "state"
  INSPECTIO_V3_WRITER_RECEIVE_WAIT_SECONDS: "20"
  INSPECTIO_V3_WRITER_RECEIVE_MAX_EVENTS: "10"
  INSPECTIO_V3_PERSISTENCE_ACK_DELETE_MAX_CONCURRENCY: "8"
  INSPECTIO_V3_WRITER_PIPELINE_ENABLE: "true"
  INSPECTIO_V3_WRITER_RECEIVE_LOOP_PARALLELISM: "2"
  INSPECTIO_V3_WRITER_FLUSH_LOOP_SLEEP_MS: "10"
  INSPECTIO_V3_WRITER_SHARD_ID: "0"
  INSPECTIO_V3_WRITER_FLUSH_MAX_EVENTS: "500"
  INSPECTIO_V3_PERSISTENCE_WRITER_FLUSH_MIN_BATCH_EVENTS: "64"
  INSPECTIO_V3_PERSISTENCE_WRITER_FLUSH_INTERVAL_MS: "1800"
  INSPECTIO_V3_PERSISTENCE_CHECKPOINT_EVERY_N_FLUSHES: "1"
  INSPECTIO_V3_WRITER_DEDUPE_EVENT_ID_CAP: "200000"
  INSPECTIO_V3_WRITER_WRITE_MAX_ATTEMPTS: "4"
  INSPECTIO_V3_WRITER_WRITE_BACKOFF_BASE_MS: "50"
  INSPECTIO_V3_WRITER_WRITE_BACKOFF_MAX_MS: "2000"
  INSPECTIO_V3_WRITER_WRITE_BACKOFF_JITTER: "0.2"
  INSPECTIO_V3_WRITER_IDLE_SLEEP_SEC: "0.2"
  INSPECTIO_V3_WRITER_OBS_SNAPSHOT_INTERVAL_SEC: "30"
  INSPECTIO_V3_WRITER_QUEUE_AGE_SAMPLE_INTERVAL_SEC: "30"
  INSPECTIO_V3_WRITER_QUEUE_AGE_TIMEOUT_SEC: "1.0"
