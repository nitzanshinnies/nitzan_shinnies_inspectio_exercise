apiVersion: v1
kind: ConfigMap
metadata:
  name: inspectio-config
  namespace: inspectio
data:
  INSPECTIO_ENV: "prod"
  INSPECTIO_AWS_REGION: "us-east-1"
  INSPECTIO_INGEST_QUEUE_URL: "REPLACE_WITH_SQS_FIFO_QUEUE_URL"
  INSPECTIO_TOTAL_SHARDS: "1024"
  INSPECTIO_WORKER_REPLICAS: "1"
  INSPECTIO_WORKER_INDEX: "0"
  INSPECTIO_WAKEUP_INTERVAL_MS: "500"
  INSPECTIO_MAX_PARALLEL_SENDS_PER_SHARD: "64"
  INSPECTIO_SMS_HTTP_TIMEOUT_SEC: "5"
  INSPECTIO_REPEAT_MAX_COUNT: "100000"
  INSPECTIO_INGEST_BUFFER_MAX_MESSAGES: "10000"
  INSPECTIO_IDEMPOTENCY_TTL_SEC: "86400"
  INSPECTIO_OUTCOMES_MAX_LIMIT: "1000"
  INSPECTIO_JOURNAL_FLUSH_INTERVAL_MS: "50"
  INSPECTIO_JOURNAL_FLUSH_MAX_LINES: "64"
  INSPECTIO_SNAPSHOT_INTERVAL_SEC: "60"
  INSPECTIO_DEFAULT_TO_E164: "+10000000000"
