apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: inspectio
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: inspectio-v3
spec:
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app.kubernetes.io/name: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: inspectio
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: inspectio-v3
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/part-of: inspectio-v3
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
