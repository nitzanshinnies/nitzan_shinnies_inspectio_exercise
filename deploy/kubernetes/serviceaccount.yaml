# Workload identity: bind an IAM role for SQS (and optional SNS/Dynamo) via IRSA.
# Replace ACCOUNT and ROLE_NAME before apply, or remove the annotation if using node/instance role only.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: inspectio-app
  namespace: inspectio
  labels:
    app.kubernetes.io/name: inspectio-app
    app.kubernetes.io/part-of: inspectio-v3
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/REPLACE_INSPECTIO_IRSA_ROLE
