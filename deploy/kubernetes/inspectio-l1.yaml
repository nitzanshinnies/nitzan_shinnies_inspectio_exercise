apiVersion: v1
kind: Service
metadata:
  name: inspectio-l1
  namespace: inspectio
  labels:
    app.kubernetes.io/name: inspectio-l1
    app.kubernetes.io/part-of: inspectio-v3
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app.kubernetes.io/name: inspectio-l1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inspectio-l1
  namespace: inspectio
  labels:
    app.kubernetes.io/name: inspectio-l1
    app.kubernetes.io/part-of: inspectio-v3
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: inspectio-l1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inspectio-l1
        app.kubernetes.io/part-of: inspectio-v3
    spec:
      serviceAccountName: inspectio-app
      containers:
        - name: l1
          image: inspectio-v3:latest
          imagePullPolicy: IfNotPresent
          args:
            - uvicorn
            - inspectio.v3.l1.serve:app
            - --host
            - 0.0.0.0
            - --port
            - "8080"
            - --workers
            - "4"
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: inspectio-v3-config
            - secretRef:
                name: inspectio-v3-secrets
                optional: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
