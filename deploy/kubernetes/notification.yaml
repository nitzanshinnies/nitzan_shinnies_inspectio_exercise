apiVersion: v1
kind: Service
metadata:
  name: notification
  namespace: inspectio
  labels:
    app.kubernetes.io/name: inspectio-exercise
    app.kubernetes.io/component: notification
spec:
  selector:
    app.kubernetes.io/component: notification
  ports:
    - name: http
      port: 8002
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification
  namespace: inspectio
  labels:
    app.kubernetes.io/name: inspectio-exercise
    app.kubernetes.io/component: notification
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: notification
  template:
    metadata:
      labels:
        app.kubernetes.io/component: notification
    spec:
      containers:
        - name: notification
          image: inspectio-exercise:latest
          imagePullPolicy: IfNotPresent
          command: ["inspectio-notification"]
          ports:
            - name: http
              containerPort: 8002
          env:
            - name: INSPECTIO_NOTIFICATION_PORT
              value: "8002"
            - name: PERSISTENCE_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: inspectio-config
                  key: PERSISTENCE_SERVICE_URL
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: inspectio-config
                  key: REDIS_URL
            - name: OUTCOMES_STORE_BACKEND
              valueFrom:
                configMapKeyRef:
                  name: inspectio-config
                  key: OUTCOMES_STORE_BACKEND
          readinessProbe:
            httpGet:
              path: /internal/v1/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
