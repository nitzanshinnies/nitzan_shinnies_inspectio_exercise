apiVersion: apps/v1
kind: Deployment
metadata:
  name: inspectio-notification
  namespace: inspectio
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inspectio-notification
  template:
    metadata:
      labels:
        app: inspectio-notification
    spec:
      serviceAccountName: inspectio-app
      containers:
        - name: notification
          image: REPLACE_WITH_APP_IMAGE
          imagePullPolicy: IfNotPresent
          command: ["uvicorn"]
          args: ["inspectio.notification.app:app", "--host", "0.0.0.0", "--port", "8081"]
          ports:
            - containerPort: 8081
          env:
            - name: INSPECTIO_NOTIFICATION_PORT
              value: "8081"
          envFrom:
            - configMapRef:
                name: inspectio-config
            - secretRef:
                name: inspectio-secrets
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: inspectio-notification
  namespace: inspectio
spec:
  selector:
    app: inspectio-notification
  ports:
    - port: 8081
      targetPort: 8081
