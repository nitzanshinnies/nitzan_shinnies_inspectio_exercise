apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: inspectio
  labels:
    app.kubernetes.io/name: inspectio-exercise
    app.kubernetes.io/component: api
spec:
  selector:
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 8000
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: inspectio
  labels:
    app.kubernetes.io/name: inspectio-exercise
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: inspectio-exercise:latest
          imagePullPolicy: IfNotPresent
          command: ["inspectio-api"]
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: INSPECTIO_API_PORT
              value: "8000"
            - name: PERSISTENCE_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: inspectio-config
                  key: PERSISTENCE_SERVICE_URL
            - name: NOTIFICATION_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: inspectio-config
                  key: NOTIFICATION_SERVICE_URL
            - name: TOTAL_SHARDS
              valueFrom:
                configMapKeyRef:
                  name: inspectio-config
                  key: TOTAL_SHARDS
            - name: INSPECTIO_WORKER_ACTIVATION_URLS
              valueFrom:
                configMapKeyRef:
                  name: inspectio-config
                  key: INSPECTIO_WORKER_ACTIVATION_URLS
            - name: INSPECTIO_WORKER_SHARDS_PER_POD
              valueFrom:
                configMapKeyRef:
                  name: inspectio-config
                  key: INSPECTIO_WORKER_SHARDS_PER_POD
            - name: INSPECTIO_HTTPX_MAX_CONNECTIONS
              valueFrom:
                configMapKeyRef:
                  name: inspectio-config
                  key: INSPECTIO_HTTPX_MAX_CONNECTIONS
            - name: INSPECTIO_HTTPX_MAX_KEEPALIVE_CONNECTIONS
              valueFrom:
                configMapKeyRef:
                  name: inspectio-config
                  key: INSPECTIO_HTTPX_MAX_KEEPALIVE_CONNECTIONS
            - name: INSPECTIO_HTTPX_POOL_TIMEOUT_SEC
              valueFrom:
                configMapKeyRef:
                  name: inspectio-config
                  key: INSPECTIO_HTTPX_POOL_TIMEOUT_SEC
            - name: INSPECTIO_REPEAT_SUBMIT_PUT_BATCH_SIZE
              valueFrom:
                configMapKeyRef:
                  name: inspectio-config
                  key: INSPECTIO_REPEAT_SUBMIT_PUT_BATCH_SIZE
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
