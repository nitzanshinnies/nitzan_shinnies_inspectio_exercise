apiVersion: apps/v1
kind: Deployment
metadata:
  name: inspectio-api
  namespace: inspectio
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inspectio-api
  template:
    metadata:
      labels:
        app: inspectio-api
    spec:
      enableServiceLinks: false
      serviceAccountName: inspectio-app
      containers:
        - name: api
          image: REPLACE_WITH_APP_IMAGE
          imagePullPolicy: IfNotPresent
          command: ["uvicorn"]
          args: ["inspectio.api.app:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: inspectio-config
            - secretRef:
                name: inspectio-secrets
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: inspectio-api
  namespace: inspectio
spec:
  selector:
    app: inspectio-api
  ports:
    - port: 8000
      targetPort: 8000
